services:
  - type: web
    name: custodian-terminal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 --chdir custodian-terminal server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: BOOT_DELAY
        value: "0.35"
